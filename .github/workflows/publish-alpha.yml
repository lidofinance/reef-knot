name: Publish Alpha Version to NPM

on:
  workflow_dispatch:

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  # Gate the whole alpha publish before the dry-run: a prerelease branch must
  # have main merged in, or semantic-release (which only sees tags merged into
  # the branch) computes a version below the latest stable. gh api needs no
  # checkout and works on private repos via GITHUB_TOKEN.
  guard:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure develop is not behind main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          behind=$(gh api "repos/${{ github.repository }}/compare/develop...main" --jq '.ahead_by')
          # Fail closed: a non-numeric result (API error / unexpected body) must
          # block the publish, not silently pass the guard.
          if ! [[ "$behind" =~ ^[0-9]+$ ]]; then
            echo "::error::could not compare develop vs main (got: '$behind')"
            exit 1
          fi
          if [ "$behind" -gt 0 ]; then
            echo "::error::develop is behind main by $behind commit(s) — merge main into develop before an alpha release"
            exit 1
          fi
  pre-publish:
    needs: guard
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/publish-dry-run.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  publish:
    needs: pre-publish
    runs-on: ubuntu-latest
    environment: development
    # restricts job to develop branch
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Build
        run: yarn build-packages

      - name: Verify provenance attestations & registry signatures of installed dependencies
        run: npm audit signatures

      - name: Audit dependencies for known vulnerabilities
        run: yarn npm audit

      - name: Authenticate in npm
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          echo "workspaces-update=false" >> .npmrc
          echo "provenance=true" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Alpha
        run: yarn multi-semantic-release
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
